<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tha Ascend — Shopify Excellence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-scroll {
      animation: scroll 15s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.15; transform: scale(1.05); }
    }
    .animate-pulse { animation: pulse 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Icons simples inline (remplacement de lucide-react)
    const ArrowUpRight = ({ className = "", size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="7" y1="17" x2="17" y2="7"/>
        <polyline points="7 7 17 7 17 17"/>
      </svg>
    );
    const ArrowRight = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    );
    const Sparkles = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/>
        <path d="M5 3l.5 1.5L7 5l-1.5.5L5 7l-.5-1.5L3 5l1.5-.5z"/>
        <path d="M19 17l.5 1.5L21 19l-1.5.5L19 21l-.5-1.5L17 19l1.5-.5z"/>
      </svg>
    );

    // --- CURSEUR PERSONNALISÉ ---
    const CustomCursor = () => {
      const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
      const [isHovering, setIsHovering] = useState(false);

      useEffect(() => {
        const updateMousePosition = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
        const handleMouseOver = (e) => {
          if (e.target.tagName.toLowerCase() === 'a' || e.target.tagName.toLowerCase() === 'button' || e.target.closest('.hover-trigger')) {
            setIsHovering(true);
          } else {
            setIsHovering(false);
          }
        };
        window.addEventListener('mousemove', updateMousePosition);
        window.addEventListener('mouseover', handleMouseOver);
        return () => {
          window.removeEventListener('mousemove', updateMousePosition);
          window.removeEventListener('mouseover', handleMouseOver);
        };
      }, []);

      return (
        <>
          <div
            className="hidden md:block fixed top-0 left-0 w-4 h-4 rounded-full pointer-events-none z-[100]"
            style={{
              transform: `translate3d(${mousePosition.x - 8}px, ${mousePosition.y - 8}px, 0) scale(${isHovering ? 2.5 : 1})`,
              backgroundColor: 'white',
              mixBlendMode: 'difference',
              transition: 'transform 100ms ease-out'
            }}
          />
          <div
            className="hidden md:block fixed top-0 left-0 w-10 h-10 border border-zinc-500 rounded-full pointer-events-none z-[99]"
            style={{
              transform: `translate3d(${mousePosition.x - 20}px, ${mousePosition.y - 20}px, 0) scale(${isHovering ? 0 : 1})`,
              opacity: isHovering ? 0 : 1,
              transition: 'transform 300ms ease-out, opacity 300ms ease-out'
            }}
          />
        </>
      );
    };

    // --- ANIMATION AU SCROLL ---
    const Reveal = ({ children, className = "", delay = 0, type = "fade-up" }) => {
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
          },
          { threshold: 0.1, rootMargin: "0px 0px -50px 0px" }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);

      const styleMap = {
        "fade-up": isVisible ? { opacity: 1, transform: 'translateY(0)' } : { opacity: 0, transform: 'translateY(80px)' },
        "scale-up": isVisible ? { opacity: 1, transform: 'scale(1)' } : { opacity: 0, transform: 'scale(0.95)' },
        "slide-right": isVisible ? { opacity: 1, transform: 'translateX(0)' } : { opacity: 0, transform: 'translateX(-80px)' },
      };

      return (
        <div
          ref={ref}
          className={className}
          style={{
            transition: `all 1200ms cubic-bezier(0.16,1,0.3,1) ${delay}ms`,
            ...styleMap[type]
          }}
        >
          {children}
        </div>
      );
    };

    // --- APP PRINCIPALE ---
    function App() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [activeService, setActiveService] = useState(null);

      const services = [
        { id: '01', title: "Thèmes Sur Mesure", desc: "Création de A à Z. Fini les templates rigides. Nous construisons une identité unique, rapide et pensée pour votre marque.", gradient: "from-zinc-200 to-zinc-400" },
        { id: '02', title: "Refonte & Conversion", desc: "Audit UX/UI et restructuration complète. Nous transformons votre trafic en acheteurs avec des parcours optimisés.", gradient: "from-zinc-800 to-zinc-950" },
        { id: '03', title: "Fonctionnalités Avancées", desc: "Bundles dynamiques, quiz personnalisés, intégrations API complexes. Repoussez les limites natives de Shopify.", gradient: "from-zinc-400 to-zinc-600" }
      ];

      return (
        <div className="min-h-screen bg-[#EBEBEB] text-zinc-950 overflow-x-hidden" style={{ fontFamily: "'Inter', sans-serif", cursor: 'none' }}>
          <CustomCursor />

          {/* NAVIGATION */}
          <nav className="fixed top-0 left-0 w-full z-50 py-6" style={{ mixBlendMode: 'difference', color: 'white' }}>
            <div className="max-w-[1400px] mx-auto px-6 md:px-12 flex justify-between items-start">
              <a href="#" className="hover-trigger flex flex-col uppercase tracking-tighter text-xl font-bold leading-none" style={{ textDecoration: 'none', color: 'inherit' }}>
                <span>Tha</span>
                <span>Ascend<span style={{ color: '#71717a' }}>.</span></span>
              </a>
              <button
                className="hover-trigger uppercase text-xs font-medium"
                style={{ letterSpacing: '0.2em', display: 'flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', color: 'inherit', cursor: 'none' }}
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
              >
                {isMobileMenuOpen ? 'Fermer' : 'Menu'}
              </button>
            </div>
          </nav>

          {/* MENU FULLSCREEN */}
          <div
            className="fixed inset-0 bg-zinc-950 text-white z-40 flex flex-col justify-center items-center"
            style={{
              clipPath: isMobileMenuOpen ? 'circle(150% at 100% 0)' : 'circle(0% at 100% 0)',
              opacity: isMobileMenuOpen ? 1 : 0,
              pointerEvents: isMobileMenuOpen ? 'auto' : 'none',
              transition: 'clip-path 1000ms cubic-bezier(0.16,1,0.3,1), opacity 500ms'
            }}
          >
            <div className="flex flex-col gap-8 text-center">
              {['Expertise', 'Approche', 'Services', 'Contact'].map((item) => (
                <a
                  key={item}
                  href={`#${item.toLowerCase()}`}
                  onClick={() => setIsMobileMenuOpen(false)}
                  style={{ textDecoration: 'none', color: 'white', fontSize: 'clamp(3rem, 8vw, 8rem)', fontWeight: 300, textTransform: 'uppercase', letterSpacing: '-0.05em', display: 'block', transition: 'transform 300ms' }}
                  onMouseEnter={e => { e.currentTarget.style.fontStyle = 'italic'; e.currentTarget.style.transform = 'translateX(16px)'; }}
                  onMouseLeave={e => { e.currentTarget.style.fontStyle = 'normal'; e.currentTarget.style.transform = 'translateX(0)'; }}
                >
                  {item}
                </a>
              ))}
            </div>
          </div>

          {/* HERO */}
          <section className="relative h-screen w-full flex flex-col justify-end pb-12 px-6 md:px-12" style={{ maxWidth: 1400, margin: '0 auto' }}>
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ opacity: 0.1 }}>
              <div
                className="animate-pulse rounded-full"
                style={{ width: 'min(80vw, 600px)', height: 'min(80vw, 600px)', background: 'linear-gradient(to top right, #71717a, #18181b)', filter: 'blur(80px)' }}
              />
            </div>
            <Reveal delay={200}>
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-8 relative" style={{ zIndex: 10 }}>
                <h1 style={{ fontSize: 'clamp(4rem, 10vw, 12rem)', lineHeight: 0.8, fontWeight: 500, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: 0 }}>
                  Shopify <br />
                  <span style={{ fontStyle: 'italic', fontWeight: 300, color: '#71717a' }}>Excellence.</span>
                </h1>
                <div className="max-w-sm" style={{ marginBottom: '2rem' }}>
                  <p style={{ fontSize: '1.25rem', fontWeight: 500, marginBottom: '1.5rem' }}>
                    L'agence e-commerce qui allie design de classe mondiale et performances de conversion chirurgicales.
                  </p>
                  <a href="#contact" className="hover-trigger" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, borderBottom: '2px solid #09090b', paddingBottom: 4, fontSize: '0.875rem', textTransform: 'uppercase', letterSpacing: '0.15em', fontWeight: 700, textDecoration: 'none', color: 'inherit', transition: 'gap 300ms' }}>
                    Démarrer un projet <ArrowRight size={16} />
                  </a>
                </div>
              </div>
            </Reveal>
          </section>

          {/* TICKER */}
          <section className="py-12 bg-zinc-950 text-white overflow-hidden" style={{ borderTop: '1px solid #27272a', borderBottom: '1px solid #27272a' }}>
            <div className="flex whitespace-nowrap animate-scroll">
              {[1, 2, 3, 4].map((i) => (
                <div key={i} className="flex items-center gap-8 mx-4">
                  <span
                    style={{ fontSize: 'clamp(3rem, 8vw, 8rem)', fontWeight: 900, textTransform: 'uppercase', letterSpacing: '-0.05em', color: 'transparent', WebkitTextStroke: '1px rgba(255,255,255,0.5)' }}
                  >
                    DESIGN. DEVELOP. SCALE.
                  </span>
                  <Sparkles size={48} className="text-zinc-600" />
                </div>
              ))}
            </div>
          </section>

          {/* EXPERTISE */}
          <section id="expertise" className="py-32 md:py-48 px-6 md:px-12" style={{ maxWidth: 1400, margin: '0 auto' }}>
            <Reveal>
              <p style={{ textTransform: 'uppercase', letterSpacing: '0.2em', fontSize: '0.75rem', fontWeight: 700, marginBottom: '4rem', display: 'flex', alignItems: 'center', gap: 16 }}>
                <span style={{ display: 'inline-block', width: 32, height: 1, background: '#09090b' }}></span>
                Notre Cœur d'Expertise
              </p>
            </Reveal>
            <div style={{ borderTop: '1px solid #d4d4d8' }}>
              {services.map((service, index) => (
                <div
                  key={service.id}
                  className="hover-trigger"
                  style={{ borderBottom: '1px solid #d4d4d8', padding: '4rem 0', position: 'relative', cursor: 'pointer' }}
                  onMouseEnter={() => setActiveService(index)}
                  onMouseLeave={() => setActiveService(null)}
                >
                  <div
                    style={{
                      display: window.innerWidth >= 1024 ? 'block' : 'none',
                      position: 'absolute',
                      top: '50%', left: '50%',
                      transform: activeService === index
                        ? 'translate(-50%, -50%) scale(1) rotate(2deg)'
                        : 'translate(-50%, -50%) scale(0.9) rotate(-2deg)',
                      width: 400, height: 250,
                      borderRadius: 12,
                      background: `linear-gradient(to bottom right, ${service.gradient === 'from-zinc-200 to-zinc-400' ? '#e4e4e7, #a1a1aa' : service.gradient === 'from-zinc-800 to-zinc-950' ? '#27272a, #09090b' : '#a1a1aa, #52525b'})`,
                      boxShadow: '0 25px 50px rgba(0,0,0,0.25)',
                      pointerEvents: 'none',
                      zIndex: 10,
                      opacity: activeService === index ? 1 : 0,
                      transition: 'all 700ms cubic-bezier(0.16,1,0.3,1)'
                    }}
                  />
                  <div
                    style={{
                      display: 'flex',
                      flexWrap: 'wrap',
                      alignItems: 'center',
                      justifyContent: 'space-between',
                      gap: 24,
                      position: 'relative',
                      zIndex: 20,
                      transform: activeService === index ? 'translateX(16px)' : 'translateX(0)',
                      transition: 'transform 500ms'
                    }}
                  >
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: '3rem' }}>
                      <span style={{ fontSize: '1.125rem', fontWeight: 300, color: '#a1a1aa' }}>/{service.id}</span>
                      <h3 style={{ fontSize: 'clamp(2rem, 5vw, 4rem)', fontWeight: 500, letterSpacing: '-0.05em', textTransform: 'uppercase', margin: 0 }}>
                        {service.title}
                      </h3>
                    </div>
                    <p style={{ maxWidth: 400, fontSize: '1.125rem', color: activeService === index ? '#09090b' : '#52525b', transition: 'color 500ms' }}>
                      {service.desc}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* APPROCHE - STICKY */}
          <section id="approche">
            <div className="grid grid-cols-1 lg:grid-cols-2">
              <div className="bg-zinc-950 text-white p-6 md:p-12 lg:h-screen lg:sticky top-0 flex flex-col justify-center">
                <Reveal type="slide-right">
                  <span style={{ textTransform: 'uppercase', letterSpacing: '0.2em', fontSize: '0.75rem', fontWeight: 700, marginBottom: '2rem', color: '#71717a', display: 'block' }}>L'Approche</span>
                  <h2 style={{ fontSize: 'clamp(2.5rem, 6vw, 5rem)', fontWeight: 500, letterSpacing: '-0.05em', lineHeight: 0.9, margin: 0 }}>
                    L'esthétique <br/>
                    <span style={{ fontStyle: 'italic', fontWeight: 300, color: '#a1a1aa' }}>rencontre</span> <br/>
                    la conversion.
                  </h2>
                  <p style={{ marginTop: '2rem', fontSize: '1.25rem', color: '#a1a1aa', maxWidth: 400, fontWeight: 300 }}>
                    Nous fusionnons une direction artistique primée avec une ingénierie front-end de pointe pour dominer votre marché.
                  </p>
                </Reveal>
              </div>
              <div className="bg-[#EBEBEB] p-6 md:p-12" style={{ paddingTop: '8rem', paddingBottom: '8rem', display: 'flex', flexDirection: 'column', gap: '8rem' }}>
                {[
                  { num: '01', title: 'Design Sans Compromis', text: "Chaque pixel est pensé pour refléter l'ADN premium de votre marque. Fini les interfaces qui se ressemblent toutes. Nous créons des expériences mémorables." },
                  { num: '02', title: 'Performance Radicale', text: "Un design incroyable ne sert à rien s'il est lent. Nous développons des architectures Shopify ultra-légères. Des temps de chargement instantanés pour un SEO maximisé." },
                  { num: '03', title: 'Focus Business', text: "Nos décisions créatives et techniques sont dictées par une seule métrique : votre chiffre d'affaires. L'UX est pensée pour fluidifier le tunnel d'achat et augmenter le panier moyen." }
                ].map((step, idx) => (
                  <Reveal key={step.num} delay={100 * idx}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                      <div style={{ fontSize: '6rem', fontWeight: 900, color: '#e4e4e7', letterSpacing: '-0.05em', lineHeight: 1 }}>{step.num}</div>
                      <h4 style={{ fontSize: 'clamp(1.75rem, 3vw, 2.5rem)', fontWeight: 500, margin: 0 }}>{step.title}</h4>
                      <p style={{ fontSize: '1.25rem', color: '#52525b', lineHeight: 1.7, fontWeight: 300, maxWidth: 500 }}>{step.text}</p>
                    </div>
                  </Reveal>
                ))}
              </div>
            </div>
          </section>

          {/* SERVICES STATIQUES */}
          <section id="services" className="py-32 md:py-48 px-6 md:px-12 bg-white">
            <div style={{ maxWidth: 1400, margin: '0 auto' }}>
              <Reveal>
                <div className="flex flex-col md:flex-row justify-between items-start gap-12">
                  <div className="md:w-1/2">
                    <p style={{ textTransform: 'uppercase', letterSpacing: '0.2em', fontSize: '0.75rem', fontWeight: 700, marginBottom: '2rem', color: '#a1a1aa', display: 'flex', alignItems: 'center', gap: 16 }}>
                      <span style={{ display: 'inline-block', width: 32, height: 1, background: '#a1a1aa' }}></span>
                      Au-delà de Shopify
                    </p>
                    <h2 style={{ fontSize: 'clamp(2.5rem, 6vw, 5rem)', fontWeight: 500, letterSpacing: '-0.05em', lineHeight: 0.9, marginBottom: '2rem' }}>
                      Sites Statiques <br/>
                      <span style={{ color: '#d4d4d8' }}>Modernes.</span>
                    </h2>
                    <a href="#contact" className="hover-trigger" style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 128, height: 128, borderRadius: '50%', border: '1px solid #e4e4e7', fontSize: '0.875rem', fontWeight: 700, textTransform: 'uppercase', textDecoration: 'none', color: 'inherit', transition: 'background 500ms, color 500ms' }}
                      onMouseEnter={e => { e.currentTarget.style.background = '#09090b'; e.currentTarget.style.color = 'white'; }}
                      onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'inherit'; }}
                    >
                      Découvrir
                    </a>
                  </div>
                  <div className="md:w-1/2" style={{ display: 'flex', flexDirection: 'column', gap: '2rem', fontSize: '1.25rem', fontWeight: 300, color: '#52525b' }}>
                    <p>Pour les agences, les portfolios et les entreprises B2B nécessitant une vitrine institutionnelle irréprochable.</p>
                    <p>Nous développons des écosystèmes Headless et des sites statiques (React, Next.js) offrant une sécurité absolue, un SEO technique parfait et des animations WebGL dignes des plus grandes agences.</p>
                    <div style={{ paddingTop: '2rem', borderTop: '1px solid #e4e4e7', display: 'flex', flexWrap: 'wrap', gap: 12, marginTop: '2rem' }}>
                      {['React', 'Next.js', 'Framer Motion', 'Tailwind', 'Headless CMS'].map(tech => (
                        <span key={tech} style={{ padding: '8px 16px', border: '1px solid #e4e4e7', borderRadius: 9999, fontSize: '0.875rem' }}>{tech}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </Reveal>
            </div>
          </section>

          {/* FOOTER CTA */}
          <footer id="contact" className="bg-zinc-950 text-white px-6 md:px-12 overflow-hidden flex flex-col relative" style={{ paddingTop: 'clamp(8rem, 12vw, 12rem)', paddingBottom: '3rem' }}>
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at top right, rgba(63,63,70,0.2), #09090b)', pointerEvents: 'none' }} />
            <div style={{ maxWidth: 1400, margin: '0 auto', width: '100%', position: 'relative', zIndex: 10, flexGrow: 1, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
              <Reveal>
                <p style={{ color: '#a1a1aa', fontSize: '1.25rem', fontWeight: 300, marginBottom: '2rem' }}>Vous avez un projet ambitieux ?</p>
                <a href="mailto:hello@thaascend.com" className="hover-trigger" style={{ textDecoration: 'none', color: 'white', display: 'block' }}
                  onMouseEnter={e => { e.currentTarget.querySelector('h2').style.color = '#a1a1aa'; }}
                  onMouseLeave={e => { e.currentTarget.querySelector('h2').style.color = 'white'; }}
                >
                  <h2 style={{ fontSize: 'clamp(3rem, 12vw, 10rem)', lineHeight: 0.8, fontWeight: 500, letterSpacing: '-0.05em', textTransform: 'uppercase', transition: 'color 500ms', margin: 0 }}>
                    Let's Talk <br/>
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 'clamp(1rem, 3vw, 2rem)', fontStyle: 'italic', fontWeight: 300 }}>
                      Business
                      <span style={{ display: 'inline-flex', justifyContent: 'center', alignItems: 'center', width: 'clamp(56px, 8vw, 100px)', height: 'clamp(56px, 8vw, 100px)', borderRadius: '50%', background: 'white', color: '#09090b', transition: 'transform 500ms' }}>
                        <ArrowUpRight style={{ width: '50%', height: '50%' }} />
                      </span>
                    </span>
                  </h2>
                </a>
              </Reveal>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '3rem', marginTop: 'clamp(6rem, 10vw, 12rem)', paddingTop: '2rem', borderTop: '1px solid #27272a', fontSize: '0.875rem', fontWeight: 300, color: '#a1a1aa' }}>
                <div>
                  <p style={{ fontWeight: 500, color: 'white', marginBottom: '1rem', textTransform: 'uppercase', letterSpacing: '0.15em', fontSize: '0.75rem' }}>Tha Ascend INC.</p>
                  <p>Expertise E-commerce & Design</p>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <p style={{ fontWeight: 500, color: 'white', marginBottom: '1rem', textTransform: 'uppercase', letterSpacing: '0.15em', fontSize: '0.75rem' }}>Socials</p>
                  {['Instagram', 'LinkedIn', 'Awwwards'].map(s => (
                    <a key={s} href="#" style={{ color: '#a1a1aa', textDecoration: 'none', transition: 'color 300ms', width: 'fit-content' }}
                      onMouseEnter={e => { e.currentTarget.style.color = 'white'; }}
                      onMouseLeave={e => { e.currentTarget.style.color = '#a1a1aa'; }}
                    >{s}</a>
                  ))}
                </div>
                <div style={{ textAlign: 'right' }}>
                  <p>&copy; {new Date().getFullYear()} Tous droits réservés.</p>
                  <p style={{ marginTop: 8 }}>Montréal / Paris / Remote</p>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
